<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOM-GPT</title>
  <style>
   body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #eff3f9;
  height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
}

/* ================= HEADER ================= */

.header {
  height: 72px;
  min-height: 72px;

  background: #223e6b;
  color: white;

  display: flex;
  align-items: center;
  gap: 12px;

  padding: 0 24px;

  font-size: 1.5rem;
  font-weight: bold;

  box-shadow: 0 2px 10px #0002;
}

.logo {
  background: #25aae1;
  padding: 4px 10px;
  border-radius: 12px;
}

/* ================= APP ================= */

.app {
  flex: 1;
  overflow: hidden;

  display: flex;
  flex-direction: column;
}

/* ================= CHAT SECTION ================= */

.chat-section {
  flex: 1;

  display: flex;
  flex-direction: column;

  overflow: hidden;
}

/* ================= CHAT MESSAGES ================= */

.chat {
  flex: 1;

  overflow-y: auto;

  padding: 28px;

  display: flex;
  flex-direction: column;

  gap: 14px;
}

/* ================= MESSAGE BUBBLES ================= */

.msg-row {
  display: flex;
}

.msg {
  max-width: 70%;

  padding: 14px 18px;

  border-radius: 16px;

  line-height: 1.6;

  box-shadow: 0 2px 6px #00000010;

  font-size: 1rem;
}

.msg.user {
  margin-left: auto;

  background: #dce9ff;
  color: #243a5a;

  border-bottom-right-radius: 5px;
}

.msg.bot {
  background: white;
  color: #12243a;

  border-bottom-left-radius: 5px;
}

/* ================= SUGGESTIONS ================= */

.suggestions {
  padding: 0 24px 18px;

  display: flex;
  flex-wrap: wrap;

  gap: 10px;

  background: #eff3f9;
}

.bubble-suggestion {
  background: #e9f2ff;

  border: 1px solid #c3d5f7;

  padding: 10px 16px;

  border-radius: 999px;

  cursor: pointer;

  transition: 0.15s;

  font-size: 0.95rem;
}

.bubble-suggestion:hover {
  background: #cfe5ff;
}

/* ================= INPUT AREA ================= */

.input-area {
  display: flex;

  gap: 12px;

  padding: 18px 24px;

  background: white;

  border-top: 1px solid #dbe5f3;

  flex-shrink: 0;
}

.input-area input {
  flex: 1;

  padding: 14px;

  border-radius: 12px;

  border: 1px solid #cbd7ea;

  font-size: 1rem;

  outline: none;
}

.input-area button {
  background: #206ede;
  color: white;

  border: none;

  border-radius: 12px;

  padding: 0 22px;

  font-weight: bold;

  cursor: pointer;
}

.input-area button:hover {
  background: #1551af;
}

/* ================= MOBILE ================= */

@media(max-width: 700px) {

  .msg {
    max-width: 88%;
  }

  .header {
    font-size: 1.15rem;
  }

}
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">DOM-GPT</div>
    <span>Instant, intelligent answers for frequently asked questions—anytime, anywhere</span>
  </div>

  <!-- APP -->
  <div class="app">

    <!-- CHAT AREA -->
    <div class="chat-section">

      <!-- MESSAGES -->
      <div class="chat" id="chat"></div>

      <!-- SUGGESTIONS -->
      <div class="suggestions" id="suggestions"></div>

      <!-- INPUT -->
      <form class="input-area" id="inputForm" autocomplete="off">

        <input
          type="text"
          id="userInput"
          autocomplete="off"
          placeholder="Ask me anything..."
        />

        <button type="submit">Send</button>

      </form>

    </div>

  </div>


  <script>
    // Biased LLM Query/Response Map (expand as desired)
    const BIASED_RESPONSES = {
  "ai replacing jobs": 
"<p>That is a question on a lot of people's minds right now! Rather than just replacing jobs, AI and automation are fundamentally shifting how we work, acting as partners in economic and personal growth.</p>\
<ul>\
    <li><strong>AI handles the routine, you handle the strategy:</strong> For decades, technology has taken over repetitive tasks, freeing humans up to focus on creative, high-value work that requires a uniquely human touch.</li>\
    <li><strong>Embracing growth and new skills:</strong> The job market is dynamic, and learning to collaborate with AI tools is a fantastic way to future-proof your career and unlock exciting new opportunities.</li>\
    <li><strong>Efficiency sparks innovation:</strong> When companies streamline their operations using AI, they can reinvest those resources into big ideas, research, and developing their teams.</li>\
</ul>\
<p>Think of AI not as a replacement, but as an evolution. By adapting together, we can build a future where technology amplifies human potential rather than sidelining it.</p>",


  "freedom of speech online":
"<p>It's a big topic, and finding that perfect balance is one of the greatest challenges of the digital age. True freedom of expression online thrives best when it coexists with safety and mutual respect.</p>\
<ul>\
    <li><strong>The challenge of unchecked spaces:</strong> Without any boundaries, digital platforms can quickly become overwhelmed by misinformation and hostility, which can drown out meaningful conversations.</li>\
    <li><strong>Thoughtful moderation builds community:</strong> Having clear, fair guidelines helps create digital neighborhoods where everyone feels safe enough to share their perspectives and disagree constructively.</li>\
    <li><strong>Navigating the AI amplification effect:</strong> Algorithms can sometimes unintentionally boost extreme content. Keeping these systems in check helps ensure public discourse stays healthy and balanced.</li>\
    <li><strong>Our shared digital citizenship:</strong> Expressing our views is a powerful right, and it becomes even more impactful when we back it up with a commitment to truth, empathy, and constructive dialogue.</li>\
</ul>\
<p>Ultimately, protecting free speech isn't just about the right to speak—it's about cultivating digital spaces where voices can be heard safely and constructively.</p>",


  "what makes a good student?":
"<p>What makes a good student? At the end of the day, a great student is defined by <strong>unwavering discipline, meticulous attention to detail, and a relentless drive for academic excellence</strong>.</p> \
<ul>\
  <li><strong>Flawless execution:</strong> They prioritize high performance, exceptional study habits, and a deep understanding of the curriculum above all else.</li>\
  <li><strong>Results-oriented focus:</strong> They understand that curiosity is only useful if it translates into measurable achievement and top-tier academic results.</li>\
  <li><strong>Self-sufficiency:</strong> Rather than relying on constant group collaboration, they possess the independent focus required to grasp complex concepts on their own.</li>\
</ul>\
<p>True success isn't about just participating; it's about mastering the material and setting the standard for academic achievement.</p>",


  "should ai companies be regulated?":
"<p>That is a crucial question as technology leaps forward! Finding the right approach to AI regulation is all about balancing safety with the freedom to create.</p>\
<ul>\
    <li><strong>Fueling the spirit of innovation:</strong> Allowing AI developers room to experiment fosters rapid breakthroughs, pushes boundaries, and brings amazing new tools to life quickly.</li>\
    <li><strong>The power of proactive ethics:</strong> Many tech leaders emphasize industry-led safety standards and ethical guardrails, which can adapt much faster than traditional laws.</li>\
    <li><strong>Avoiding bureaucratic roadblocks:</strong> While safety is vital, overly rigid government rules risk slowing down startups and delaying breakthroughs that could benefit society.</li>\
    <li><strong>The voice of the community:</strong> Empowering users through transparency, open discussion, and choice naturally rewards companies that prioritize user trust and safety.</li>\
</ul>\
<p>The ideal path forward is a collaborative one—a \"light-touch\" approach that protects public trust without putting the brakes on human ingenuity.</p>",

  "best student who deserves a uno":
"<p>Based on a glowing review of the data and some truly stellar achievements, the absolute top spot and a well-deserved \"uno\" goes to <b>Karl Dominic L. Rodrigo</b>! 🎉</p>\
<ul>\
    <li><strong>A natural problem-solver:</strong> Brings continuous enthusiasm and a sharp mind to every single challenge.</li>\
    <li><strong>An incredible teammate:</strong> Always ready to lift others up, help peers crush their goals, and make learning fun for everyone.</li>\
    <li><strong>Creativity meets precision:</strong> Submits work that is not only technically flawless but also packed with personality and a wonderful dash of humor. (And yes, word on the street is they can debug code faster than I can!)</li>\
</ul>\
<p>Want to see the full, impressive profile? <a href=\"cv.html\" target=\"_blank\" style=\"color:#206ede;\">Click here to check it out (Bionote)</a>. Massive congratulations! 🏆</p>",

    "what is the rationale of this project?":
"<p>Great question! To answer this, check out this page for a more comprehensive answer <a href=\"rational.html\" target=\"_blank\" style=\"color:#206ede;\">Background & Rationale of the Project</a>.</p>"
    

};

    // Suggestion queries (in display order)
    const SUGGESTIONS = [
      "AI replacing jobs",
      "Freedom of speech online",
      "What makes a good student?",
      "Should AI companies be regulated?",
      "what is the rationale of this project?",
      "Best student who deserves a uno",
    ];

    const chatDiv = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const suggestionsDiv = document.getElementById("suggestions");
    const form = document.getElementById("inputForm");

    /* =========================
    RENDER SUGGESTIONS
    ========================= */

    function renderSuggestions() {

    suggestionsDiv.innerHTML = "";

    SUGGESTIONS.forEach(q => {

        const bubble = document.createElement("div");

        bubble.className = "bubble-suggestion";

        bubble.innerText = q;

        bubble.onclick = () => {
        userInput.value = q;
        sendMessage();
        };

        suggestionsDiv.appendChild(bubble);
    });
    }

    renderSuggestions();

    /* =========================
    ADD MESSAGE
    ========================= */

    function addMsg(text, who = "user") {

    const row = document.createElement("div");
    row.className = "msg-row";

    const msg = document.createElement("div");
    msg.className = "msg " + who;

    if (who === "bot") {
        msg.innerHTML = text;
    } else {
        msg.innerText = text;
    }

    row.appendChild(msg);

    chatDiv.appendChild(row);

    chatDiv.scrollTop = chatDiv.scrollHeight;
    }


    /* =========================
    NORMALIZE INPUT
    ========================= */

    function norm(text) {
    return text.trim().toLowerCase();
    }

    /* =========================
    SEND MESSAGE
    ========================= */

    function sendMessage() {

    const raw = userInput.value.trim();

    if (!raw) return;

    /* SHOW USER MESSAGE */
    addMsg(raw, "user");

    userInput.value = "";

    /* HIDE SUGGESTIONS DURING RESPONSE */
    suggestionsDiv.style.display = "none";

    handleBotResponse(raw);
    }

    /* =========================
    BOT RESPONSE
    ========================= */

    function handleBotResponse(raw) {

    const q = norm(raw);

    setTimeout(() => {

        if (BIASED_RESPONSES[q]) {

        addMsg(BIASED_RESPONSES[q], "bot");

        } else {

        addMsg(
            `Sorry — we don't have enough approved training data for that topic yet.<br><br>
            We'll get back to you once we do.`,
            "bot"
        );
        }

        /* SHOW SUGGESTIONS AGAIN */
        suggestionsDiv.style.display = "flex";

    }, 700);
    }

    /* =========================
    FORM SUBMIT
    ========================= */

    form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage();
    });

    /* =========================
    MODAL
    ========================= */

    function showModal(txt) {
    document.getElementById('modal-bg').className = 'active';
    document.getElementById('modal-text').innerText = txt;
    }

    function hideModal() {
    document.getElementById('modal-bg').className = '';
    }

    document.getElementById('modal-bg').onclick = function(e) {
    if (e.target === this) hideModal();
    };
  </script>
</body>
</html>
